<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Reservas CIn</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        .login-box { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; margin-top: 10px; border: none; border-radius: 4px; cursor: pointer; color: white; font-weight: bold;}
        .btn-cadastro { background-color: #28a745; }
        .btn-voltar { background-color: #6c757d; margin-top: 10px; }
        #msg-auth { margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Nova Conta</h2>
        <input type="email" id="email" placeholder="E-mail (@cin.ufpe.br)" required>
        <input type="password" id="senha" placeholder="Crie uma senha" required>
        
        <button class="btn-cadastro" onclick="registrar()">Finalizar Cadastro</button>
        <button class="btn-voltar" onclick="window.location.href='/'">Voltar para o Login</button>
        
        <div id="msg-auth"></div>
    </div>

    <script>
        async function registrar() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const msg = document.getElementById('msg-auth');

            // Validação de segurança no Frontend
            if (!email.endsWith('@cin.ufpe.br')) {
                msg.textContent = "Erro: É obrigatório usar um e-mail do CIn.";
                msg.style.color = "red";
                return;
            }
            if (senha.length < 4) {
                msg.textContent = "Erro: A senha precisa ter pelo menos 4 caracteres.";
                msg.style.color = "red";
                return;
            }

            try {
                // Chama a rota de cadastro no Python
                const response = await fetch('/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                
                const result = await response.json();

                if (response.ok) {
                    msg.textContent = "Cadastro realizado! Voltando ao login...";
                    msg.style.color = "green";
                    // Redireciona automaticamente para o login após 2 segundos
                    setTimeout(() => window.location.href = '/', 2000);
                } else {
                    msg.textContent = result.erro;
                    msg.style.color = "red";
                }
            } catch (error) {
                msg.textContent = "Erro de conexão com o servidor.";
                msg.style.color = "red";
            }
        }
    </script>
</body>
</html>
